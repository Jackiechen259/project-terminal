name: Release desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build, sign, and stage Linux release packages
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Project Terminal v__VERSION__
          releaseBody: See the release notes and assets below.
          releaseDraft: true
          prerelease: false
          args: --bundles deb,rpm,appimage

  publish-windows:
    # tauri-action merges latest.json with the existing release manifest.
    # Keep uploads sequential so two jobs cannot overwrite each other's platform data.
    needs: publish-linux
    runs-on: windows-latest
    outputs:
      release_id: ${{ steps.stage-release.outputs.releaseId }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build, sign, and stage Windows release packages
        id: stage-release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Project Terminal v__VERSION__
          releaseBody: See the release notes and assets below.
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

  publish-release:
    # A draft is invisible to /releases/latest, so clients keep seeing the
    # previous complete release until every updater artifact is ready.
    needs: [publish-linux, publish-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Validate updater manifest and publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.publish-windows.outputs.release_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isSafeInteger(releaseId)) {
              throw new Error(`Invalid release id: ${process.env.RELEASE_ID}`);
            }

            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                per_page: 100,
              },
            );
            const latestJson = assets.find((asset) => asset.name === "latest.json");
            if (!latestJson) {
              throw new Error("latest.json was not uploaded; keeping the release as a draft.");
            }

            const response = await github.request(
              "GET /repos/{owner}/{repo}/releases/assets/{asset_id}",
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: latestJson.id,
                headers: { accept: "application/octet-stream" },
              },
            );
            const rawManifest =
              typeof response.data === "string"
                ? response.data
                : Buffer.from(response.data).toString("utf8");
            const manifest = JSON.parse(rawManifest);
            const requiredPlatforms = ["linux-x86_64", "windows-x86_64"];
            const missingPlatforms = requiredPlatforms.filter((platform) => {
              const entry = manifest.platforms?.[platform];
              return !entry?.url || !entry?.signature;
            });

            if (missingPlatforms.length > 0) {
              throw new Error(
                `latest.json is missing updater data for: ${missingPlatforms.join(", ")}. ` +
                  "Keeping the release as a draft.",
              );
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });
            core.notice(
              `Published release ${releaseId} after validating Linux and Windows updater data.`,
            );
